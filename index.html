<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>

<style>
body{
    background:#000;
    color:#00ff41;
    font-family:Consolas, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    background:#050505;
    border:2px solid #00ff41;
    box-shadow:0 0 20px #00ff41;
    padding:25px;
    border-radius:10px;
}

h2{
    color:#00ff41;
    text-align:center;
    text-shadow:0 0 10px #00ff41;
    margin-bottom:20px;
}

input{
    width:100%;
    background:#000;
    color:#00ff41;
    border:1px solid #00ff41;
    padding:12px;
    font-family:Consolas, monospace;
}

.meter{
    margin-top:15px;
    background:#111;
    height:12px;
    border:1px solid #00ff41;
}

.bar{
    height:100%;
    background:#00ff41;
    box-shadow:0 0 10px #00ff41;
}

.feedback{
    margin-top:20px;
    border:1px solid #00ff41;
    padding:12px;
    background:#001100;
}

.result{
    margin-top:15px;
    font-weight:bold;
    color:#00ff41;
}
</style>
</head>
<body>

<div class="container">
    <h2>Password Strength Analyzer</h2>

    <div class="input-group">
        <input type="password" id="password" placeholder="Enter password">
        <button class="toggle" onclick="togglePassword()">Show</button>
    </div>

    <div class="meter">
        <div class="bar" id="bar"></div>
    </div>

    <div class="result" id="result">
        Strength: -
    </div>

    <div class="common-warning" id="warning"></div>

    <div class="feedback">
        <strong>Suggestions:</strong>
        <ul id="tips"></ul>
    </div>
</div>

<script>
const passwordInput = document.getElementById("password");

const commonPasswords = [
    "123456",
    "password",
    "12345678",
    "qwerty",
    "abc123",
    "111111",
    "admin"
];

passwordInput.addEventListener("input", analyzePassword);

function analyzePassword() {
    const password = passwordInput.value;

    let score = 0;
    let tips = [];

    if(password.length >= 8) score++;
    else tips.push("Use at least 8 characters");

    if(/[a-z]/.test(password) && /[A-Z]/.test(password))
        score++;
    else
        tips.push("Add both uppercase and lowercase letters");

    if(/[0-9]/.test(password))
        score++;
    else
        tips.push("Include numbers");

    if(/[!@#$%^&*(),.?\":{}|<>]/.test(password))
        score++;
    else
        tips.push("Include special characters");

    if(password.length >= 12)
        score++;

    const result = document.getElementById("result");
    const bar = document.getElementById("bar");
    const warning = document.getElementById("warning");

    warning.textContent = "";

    if(commonPasswords.includes(password.toLowerCase())){
        warning.textContent = "⚠ This is a commonly used password!";
    }

    let strength = "";
    let color = "";
    let width = "";

    switch(score){
        case 0:
        case 1:
            strength = "Weak";
            color = "#ef4444";
            width = "25%";
            break;
        case 2:
            strength = "Fair";
            color = "#f59e0b";
            width = "50%";
            break;
        case 3:
        case 4:
            strength = "Good";
            color = "#3b82f6";
            width = "75%";
            break;
        case 5:
            strength = "Strong";
            color = "#22c55e";
            width = "100%";
            break;
    }

    result.textContent = "Strength: " + strength;
    bar.style.width = width;
    bar.style.background = color;

    document.getElementById("tips").innerHTML =
        tips.length
        ? tips.map(t => `<li>${t}</li>`).join("")
        : "<li>Excellent password!</li>";
}

function togglePassword(){
    const input = document.getElementById("password");
    const btn = document.querySelector(".toggle");

    if(input.type === "password"){
        input.type = "text";
        btn.textContent = "Hide";
    }else{
        input.type = "password";
        btn.textContent = "Show";
    }
}
</script>

</body>
</html>
