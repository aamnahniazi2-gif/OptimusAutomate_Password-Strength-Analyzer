<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM.PASSWORDANALYZER_V1.0.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        body { 
            font-family: 'Courier Prime', monospace; 
        }
        .cyber-panel {
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.2), 0 0 20px rgba(0, 255, 0, 0.4);
        }
    </style>
</head>
<body class="bg-black text-green-500 min-h-screen flex items-center justify-center p-4 selection:bg-green-500 selection:text-black">

    <div id="root" class="w-full max-w-4xl"></div>

    <script type="text/babel">
        const COMMON_PASSWORDS = new Set([
            "123456", "password", "123456789", "qwerty", "12345", 
            "password123", "football", "admin", "letmein", "p@ssword"
        ]);

        function PasswordAnalyzer() {
            const [password, setPassword] = React.useState('');

            const evaluation = React.useMemo(() => {
                const len = password.length;
                if (len === 0) return null;

                if (COMMON_PASSWORDS.has(password.toLowerCase())) {
                    return {
                        level: "CRITICAL WEAKNESS",
                        barWidth: "w-1/12",
                        barBg: "bg-red-600",
                        feedback: ["CRITICAL: Password matches global common dictionary exposure lists.", "Instantly crackable via modern rainbow tables."]
                    };
                }

                const checks = {
                    hasUpper: /[A-Z]/.test(password),
                    hasLower: /[a-z]/.test(password),
                    hasDigit: /\d/.test(password),
                    hasSpecial: /[^A-Za-z0-9]/.test(password)
                };

                let poolSize = 0;
                if (checks.hasLower) poolSize += 26;
                if (checks.hasUpper) poolSize += 26;
                if (checks.hasDigit) poolSize += 10;
                if (checks.hasSpecial) poolSize += 32;

                const entropy = poolSize > 0 ? Math.floor(len * Math.log2(poolSize)) : 0;

                const feedback = [];
                if (len < 8) {
                    feedback.push("VULNERABILITY: Sequence length dangerously critical (< 8 characters).");
                } else if (len < 12) {
                    feedback.push("WARNING: Increase total sequence length to 12+ characters for deep safety margins.");
                }

                if (!checks.hasUpper) feedback.push("REMEDIATION: Missing upper-case matrices [A-Z].");
                if (!checks.hasLower) feedback.push("REMEDIATION: Missing lower-case matrices [a-z].");
                if (!checks.hasDigit) feedback.push("REMEDIATION: Missing numerical vector sequences [0-9].");
                if (!checks.hasSpecial) feedback.push("REMEDIATION: Missing complex non-alphanumeric arrays.");

                if (entropy < 35 || len < 6) {
                    return {
                        level: "WEAK / HIGH RISK UNENCRYPTED",
                        barWidth: "w-1/4",
                        barBg: "bg-red-500",
                        feedback: feedback.length ? feedback : ["Low structural variance observed."]
                    };
                } else if (entropy < 60) {
                    return {
                        level: "MODERATE INTEGRITY",
                        barWidth: "w-2/4",
                        barBg: "bg-yellow-500",
                        feedback
                    };
                } else {
                    return {
                        level: "SECURE MATRIX VERIFIED",
                        barWidth: "w-full",
                        barBg: "bg-green-500",
                        feedback: ["No structural vulnerabilities discovered within this vector."]
                    };
                }
            }, [password]);

            return (
                <div className="border-2 border-green-500 bg-black p-6 rounded-sm cyber-panel relative">
                    
                    <div className="flex justify-between items-center border-b border-green-500 pb-2 mb-6">
                        <span className="text-lg font-bold tracking-wider">SYSTEM.PASSWORDANALYZER_V1.0.4</span>
                        <span className="text-sm opacity-80">{password.length} chars</span>
                    </div>

                    <div className="border border-green-500 p-2 mb-6 bg-black">
                        <input 
                            type="text" 
                            value={password}
                            onChange={(e) => setPassword(e.target.value)}
                            placeholder="TYPE PASSWORD..." 
                            className="w-full bg-black text-green-500 outline-none border-none text-xl tracking-widest placeholder-green-900 uppercase focus:ring-0"
                        />
                    </div>

                    <div className="mb-6">
                        <div className="text-sm font-bold tracking-wider mb-2">SECURITY_STRENGTH_LEVEL:</div>
                        <div className="w-full h-5 border border-green-500 bg-neutral-900/50 p-0.5 relative">
                            {evaluation && (
                                <div className={`h-full ${evaluation.barBg} ${evaluation.barWidth} transition-all duration-300`} />
                            )}
                        </div>
                        {evaluation && (
                            <div className="text-xs mt-1 font-bold uppercase tracking-wide">
                                STATUS: <span className="underline">{evaluation.level}</span>
                            </div>
                        )}
                    </div>

                    <div>
                        <div className="text-sm font-bold tracking-wider border-b border-green-500/40 pb-1 mb-2">
                            VULNERABILITY_REPORT:
                        </div>
                        
                        <div className="min-h-[80px] space-y-1 text-sm">
                            {!evaluation ? (
                                <div className="animate-pulse">&gt; Enter password to analyze</div>
                            ) : (
                                evaluation.feedback.map((msg, index) => (
                                    <div key={index} className="flex items-start">
                                        <span className="mr-2">&gt;</span>
                                        <span>{msg}</span>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PasswordAnalyzer />);
    </script>
</body>
</html>
